services:
  - type: web
    name: threeplcjfinal-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate
    startCommand: gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: threeplcjfinal-final-final-na-talaga.onrender.com,*.vercel.app
      - key: CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.vercel\\.app$"
